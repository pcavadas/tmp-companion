<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMP Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        height: 100%;
      }
      /* Loading-state skeletons (see src/ui/Skeleton.tsx). The shimmer fill +
         caption spinner ride every slow-to-arrive region; reduced-motion swaps
         the sweep for a calm opacity pulse and stops the spinner. */
      @keyframes tmp-shimmer {
        0% {
          background-position: 220% 0;
        }
        100% {
          background-position: -220% 0;
        }
      }
      @keyframes tmp-skelpulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      @keyframes tmp-spin {
        to {
          transform: rotate(360deg);
        }
      }
      /* Toast entrance (src/ui/primitives.tsx Toast): fade + rise-in on mount. */
      @keyframes tmp-toast-in {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .tmp-toast-in {
        animation: tmp-toast-in 0.24s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .tmp-skel {
        background: linear-gradient(
          100deg,
          #e7e9ed 34%,
          #f2f3f6 50%,
          #e7e9ed 66%
        );
        background-size: 220% 100%;
        animation: tmp-shimmer 1.65s ease-in-out infinite;
        border-radius: 4px;
      }
      .tmp-spin {
        animation: tmp-spin 0.9s linear infinite;
      }
      /* Settings detail-pane thin scrollbar (src/views/settings/SettingsView.tsx). */
      .tmp-pane-scroll {
        scrollbar-width: thin;
        scrollbar-color: rgba(15, 17, 21, 0.22) transparent;
      }
      .tmp-pane-scroll::-webkit-scrollbar {
        width: 7px;
      }
      .tmp-pane-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .tmp-pane-scroll::-webkit-scrollbar-thumb {
        background: rgba(15, 17, 21, 0.16);
        border-radius: 999px;
      }
      .tmp-pane-scroll:hover::-webkit-scrollbar-thumb {
        background: rgba(15, 17, 21, 0.28);
      }
      /* Device-status dot while reading the firmware (src/ui/DeviceStatus.tsx). */
      @keyframes tmp-fwpulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      .tmp-fwpulse {
        animation: tmp-fwpulse 1s ease-in-out infinite;
      }
      /* Slim, low-contrast scrollbar for the signal-chain strip (SignalChainView). */
      .tmp-block-strip {
        scrollbar-width: thin;
        scrollbar-color: rgba(15, 17, 21, 0.22) transparent;
      }
      .tmp-block-strip::-webkit-scrollbar {
        height: 5px;
      }
      .tmp-block-strip::-webkit-scrollbar-track {
        background: transparent;
      }
      .tmp-block-strip::-webkit-scrollbar-thumb {
        background: rgba(15, 17, 21, 0.18);
        border-radius: 999px;
      }
      .tmp-block-strip:hover::-webkit-scrollbar-thumb {
        background: rgba(15, 17, 21, 0.3);
      }
      @media (prefers-reduced-motion: reduce) {
        .tmp-skel {
          animation: tmp-skelpulse 1.8s ease-in-out infinite;
          background-position: 50% 0;
        }
        .tmp-spin {
          animation: none;
        }
        .tmp-fwpulse {
          animation: none;
        }
        .tmp-toast-in {
          animation: none;
        }
      }
    </style>
  </head>
  <body
    style="
      margin: 0;
      background: #ffffff;
      color: #0f1115;
      font-family: &quot;Inter&quot;, system-ui, sans-serif;
    "
  >
    <div id="root"></div>
    <!-- e2e: when the URL carries ?e2e (dev-only, driving the app in a real browser via
         chrome-devtools instead of Playwright), synchronously load the HTTP→Rust bridge shim
         BEFORE the app module so isTauri() is true and invoke() forwards to e2e_server:7600.
         No effect on the real Tauri build (it never uses ?e2e and has real __TAURI_INTERNALS__). -->
    <script>
      if (location.search.includes("e2e"))
        document.write('<script src="/e2e/bridge-client.js"><\/script>');
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
