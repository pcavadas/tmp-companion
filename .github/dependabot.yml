# Dependency version updates with a 7-day maturity cooldown (a window against
# freshly-published compromised releases). Security fixes are a SEPARATE lane
# (repo setting "Dependabot security updates") and are NOT delayed by this cooldown.
# Dependabot is a trusted author for arm-auto-merge.yml: its PRs arm GitHub's
# native auto-merge and merge once the branch ruleset clears (green CI + an
# approval). The maturity guard is the cooldown below — it delays when each bump
# PR is OPENED, so a freshly-published compromised release is not picked up until
# it has aged, even though the merge itself is hands-off.
version: 2

updates:
  # Frontend — Bun (package.json + bun.lock at repo root)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    ignore:
      # eslint 10 removed context.getFilename(); eslint-plugin-react (peer caps
      # at eslint 9.7) still calls it -> lint crashes. Hold the major until the
      # plugin ships eslint-10 support, then bump both together by hand.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # typescript 7 moved the TS internals @typescript-eslint/typescript-estree
      # reads (ts.ScriptKind.Cjs) -> eslint crashes on startup before parsing a
      # file, so `bun run lint` fails while `vite build` still passes (PR #98).
      # typescript-eslint 8 is the latest release and has no TS 7 support. Hold
      # the major until it ships, then bump both together by hand.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      frontend-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # Backend — Cargo (src-tauri/Cargo.toml + Cargo.lock)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      rust-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  # CI — GitHub Actions (bumps the SHA pins + their `# vN` comments together)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      actions-all:
        applies-to: version-updates
        patterns:
          - "*"
