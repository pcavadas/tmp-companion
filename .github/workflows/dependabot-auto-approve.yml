name: Dependabot auto-approve

# Dependabot can't be a CODEOWNER and CodeRabbit won't cast an approving review on
# bot-authored PRs ("Review skipped: bot user not eligible for review"), so its PRs
# would otherwise sit forever at REVIEW_REQUIRED. Auto-approve every Dependabot PR so
# it satisfies the protect-main review gate. The required status checks (build-test,
# commitlint, e2e) still gate the actual merge, so a bump that breaks the build can't
# land regardless of the approval — that (not the update type) is the safety net.
#
# Intentionally no `actions/checkout` and no third-party actions: this workflow never
# runs PR-controlled code, so the write-scoped GITHUB_TOKEN on a `pull_request` event
# is safe here.

on: pull_request

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    # pull-requests: write lets `gh pr review --approve` cast the approving review;
    # contents: read is the floor. No checkout runs, so no broader scope is needed.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Approve the Dependabot PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
