name: Dependabot auto-approve

# Dependabot can't be a CODEOWNER, and CodeRabbit won't cast an approving review on
# bot-authored PRs ("Review skipped: bot user not eligible for review"), so routine
# patch/minor bumps would otherwise sit forever at REVIEW_REQUIRED. Auto-approve the
# safe ones so they satisfy the protect-main review gate. The required status checks
# (build-test, commitlint, e2e) still gate the actual merge, and major bumps are left
# for a human on purpose — this session, cpal 0.15->0.18 and eslint 9->10 both needed
# manual work.
#
# Intentionally no `actions/checkout`: this workflow never runs PR-controlled code, so
# the write-scoped GITHUB_TOKEN on a `pull_request` event is safe here.

on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.5.0

      - name: Approve patch and minor updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
