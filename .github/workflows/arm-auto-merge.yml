name: Arm auto-merge

# Decides WHETHER to arm GitHub's native auto-merge, per author. GitHub's "protect main"
# ruleset (1 approval + build-test/commitlint/e2e green) is the floor; this workflow adds the
# one thing a ruleset can't express — "require a human review only for external authors":
#
#   - Trusted author (OWNER/MEMBER/COLLABORATOR, or dependabot[bot]) → arm auto-merge now.
#     GitHub merges once the ruleset clears (CodeRabbit's approval counts).
#   - External author → arm ONLY after @pcavadas approves; disarm on any new external push.
#     CodeRabbit-alone can never AUTO-merge an external PR.
#
# Auto-merge is armed with a GitHub App token, NOT the GITHUB_TOKEN. GitHub does not re-trigger
# workflows for pushes made by GITHUB_TOKEN, so a GITHUB_TOKEN-armed merge lands on main WITHOUT
# firing release.yml (or ci.yml) — that's how the release backlog silently built up (see #59).
# The eventual merge push is attributed to whatever identity ENABLED auto-merge, so arming as the
# App makes that push trigger the release/CI push workflows. Safety discipline is unchanged: still
# no `actions/checkout`, so PR-controlled code never runs; the App private key comes from repo
# secrets and is never exposed to the PR. The one third-party action (actions/create-github-app-
# token, GitHub-authored) is pinned to a full commit SHA.
#
# MAIN-ONLY: arming is gated to PRs whose base is `main`. The ruleset only protects main, so
# auto-merge on any other base has nothing to wait for and merges the INSTANT the PR leaves
# draft — that's how a stacked-series PR (#50) merged with zero review the moment it was marked
# ready, into an already-merged parent. Stack/side-branch PRs merge only by deliberate manual
# action; the review gate lives once, at main.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review:
    types: [submitted]

# Serialize per-PR so a review-approval (arm) and a synchronize (disarm) firing
# close together can't race to a non-deterministic final auto-merge state.
concurrency:
  group: arm-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  arm:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false && github.event.pull_request.base.ref == 'main'
    # The merge is enabled with the GitHub App token minted below, so the job's own
    # GITHUB_TOKEN needs no write scope — it inherits the workflow default contents:read.
    # The App INSTALLATION must carry Contents: write (auto-merge is a merge/contents op)
    # plus Pull requests: write — with pull-requests alone enablePullRequestAutoMerge
    # returns "Resource not accessible by integration".
    steps:
      - name: Mint a GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}

      - name: Arm or re-gate auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ github.event.pull_request.html_url }}
          ASSOC: ${{ github.event.pull_request.author_association }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          EVENT: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REVIEWER: ${{ github.event.review.user.login }}
        run: |
          set -euo pipefail

          # Decide once: arm auto-merge, disarm it, or leave it alone.
          decision=none
          case "$ASSOC" in
            OWNER|MEMBER|COLLABORATOR) decision=arm ;;
          esac
          [ "$AUTHOR" = "dependabot[bot]" ] && decision=arm

          if [ "$decision" != arm ]; then
            # External author.
            if [ "$EVENT" = "pull_request_review" ] \
               && [ "$REVIEW_STATE" = "approved" ] \
               && [ "$REVIEWER" = "pcavadas" ]; then
              decision=arm
            elif [ "$EVENT" = "pull_request_target" ] && [ "$ACTION" = "synchronize" ]; then
              decision=disarm  # new external commits — re-gate until @pcavadas re-approves
            fi
          fi

          case "$decision" in
            arm)
              echo "Arming auto-merge (author=$AUTHOR assoc=$ASSOC)."
              gh pr merge --auto --squash "$PR"
              ;;
            disarm)
              echo "External PR pushed new commits — disarming until @pcavadas re-approves."
              gh pr merge --disable-auto "$PR" || true
              ;;
            *)
              echo "External PR not approved by @pcavadas — leaving un-armed."
              ;;
          esac
