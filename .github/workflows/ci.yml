name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: macos-14 # the Rust crate is macOS-only (IOKit/CoreAudio)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (also produces dist/ for tauri-build)
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Format check (prettier)
        run: bun run format:check

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Frontend tests
        run: bun run test

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Rust clippy
        working-directory: src-tauri
        # Two lanes: default features, then the e2e feature. The e2e lane is
        # required because sim_device (+ e2e_server) only compile under
        # `feature = "e2e"`, so default-features clippy never sees their dead
        # code. Keep both — the default lane still guards default-only paths.
        run: |
          cargo clippy --all-targets -- -D warnings
          cargo clippy --all-targets --features e2e -- -D warnings

      - name: Rust format check
        working-directory: src-tauri
        run: cargo fmt --check

  e2e:
    runs-on: macos-14 # exclusive-seize HID + CoreAudio; offline uses the SimDevice fake
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install chromium

      - name: Offline e2e (SimDevice)
        run: bun run e2e

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6

  leak-guard:
    # Belt-and-braces for the pre-commit hook: block private firmware-emulator
    # content in tracked files. Pure grep — no macOS/HID/bun needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Scan tracked files for private-project markers
        run: bash scripts/leak-guard.sh --all
