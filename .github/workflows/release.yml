name: release

on:
  push:
    branches: [main]
  # Manual fallback: token-armed auto-merge pushes to main run as GITHUB_TOKEN,
  # which GitHub does NOT re-trigger workflows for, so the push trigger above
  # silently skips auto-merged releases. Run this from the Actions tab to cut
  # the pending release. (Proper fix: arm auto-merge with a PAT/App token.)
  workflow_dispatch:

# Serialize releases: a manual dispatch could overlap a push-triggered run (or
# another dispatch), racing semantic-release on release creation. Queue instead
# of cancel so an in-flight signing/notarization is never aborted mid-run.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: macos-14 # macOS-only crate; ARM host cross-builds the universal (arm64+x86_64) binary
    environment: release # gates the Apple signing/notarization secrets to this env
    # Backstop a hung `notarytool --wait`: without this the job inherits the 360-min
    # default and can burn ~6h on the 10×-cost macOS runner. A normal run is ~7 min.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Gate the release: a broken build/test must not cut a signed, notarized
      # DMG. These run before semantic-release, so a failure aborts the release.
      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Frontend tests
        run: bun run test

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — Tauri imports the cert into a temp keychain and signs
          # with hardened runtime when these are set.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization — Tauri notarizes + staples the .app before building the dmg.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater signing — Tauri signs the .app.tar.gz with this minisign key so
          # the shipped pubkey verifies the download before it's applied.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bunx semantic-release
